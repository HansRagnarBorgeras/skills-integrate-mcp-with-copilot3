<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-bar">
        <div>
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>

        <div class="account-panel">
          <button id="account-button" class="account-button" type="button" aria-expanded="false">
            <span class="account-icon">&#128100;</span>
            <span id="account-button-label">Teacher Login</span>
          </button>

          <div id="auth-panel" class="auth-panel hidden">
            <p id="auth-status" class="auth-status">Teachers can log in to manage registrations.</p>

            <form id="login-form">
              <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" required placeholder="teacher username" />
              </div>
              <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" required placeholder="password" />
              </div>
              <div class="auth-actions">
                <button id="login-button" type="submit">Log In</button>
                <button id="logout-button" type="button" class="secondary-button hidden">Log Out</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Register a Student <span class="teacher-badge">Teachers only</span></h3>
        <p id="teacher-helper" class="helper-text">
          Log in as a teacher to register or remove students from activities.
        </p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
